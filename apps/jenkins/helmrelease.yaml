apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jenkins
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.jenkins.io
---
apiVersion: v1
kind: Namespace
metadata:
  name: jenkins
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jenkins
  namespace: jenkins
spec:
  interval: 10m

  chart:
    spec:
      chart: jenkins
      version: "5.*"
      sourceRef:
        kind: HelmRepository
        name: jenkins
        namespace: flux-system

  values:

    controller:

      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi

      installPlugins:
        - kubernetes:latest
        - workflow-aggregator:latest
        - git:latest
        - configuration-as-code:latest
        - docker-workflow:latest
        - credentials-binding:latest
        - github:latest
        - job-dsl:latest

      extraEnvVars:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: jenkins-github-token
              key: token

      JCasC:
        defaultConfig: true

        configScripts:

          credentials: |
            credentials:
              system:
                domainCredentials:
                  - credentials:
                      - usernamePassword:
                          id: "github-creds"
                          username: "vaishjp"
                          password: "${GITHUB_TOKEN}"
                          description: "GitHub token for GitOps repo updates"
                          scope: GLOBAL

          seed-jobs: |
            jobs:
              - script: >
                  pipelineJob('oneclick-pipeline') {
                    definition {
                      cpsScm {
                        scm {
                          git {
                            remote {
                              url('https://github.com/vaishjp/Kobie_Hackathon_Project.git')
                            }
                            branch('main')
                          }
                        }
                        scriptPath('Jenkinsfile')
                      }
                    }
                    triggers {
                      githubPush()
                    }
                  }

              - script: >
                  pipelineJob('drift-detection') {
                    definition {
                      cpsScm {
                        scm {
                          git {
                            remote {
                              url('https://github.com/vaishjp/Kobie_Hackathon_Project.git')
                            }
                            branch('main')
                          }
                        }
                        scriptPath('Jenkinsfile.drift')
                      }
                    }
                    triggers {
                      cron('H 2 * * *')
                    }
                  }

    agent:
      podTemplates:
        dind: |
          - name: dind-agent
            label: dind-agent
            serviceAccount: jenkins
            yaml: |
              apiVersion: v1
              kind: Pod
              spec:

                initContainers:

                - name: trivy-install
                  image: aquasec/trivy:0.65.0
                  command:
                  - sh
                  - -c
                  - |
                    cp /usr/local/bin/trivy /shared-bin/trivy
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                - name: aws-cli-install
                  image: public.ecr.aws/aws-cli/aws-cli:latest
                  command:
                  - sh
                  - -c
                  - |
                    cp /usr/local/bin/aws /shared-bin/aws || \
                    cp /usr/local/aws-cli/v2/current/bin/aws /shared-bin/aws
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                - name: kubectl-install
                  image: curlimages/curl:8.10.1
                  command:
                  - sh
                  - -c
                  - |
                    KVER=$(curl -sL https://dl.k8s.io/release/stable.txt)
                    curl -sL https://dl.k8s.io/release/${KVER}/bin/linux/amd64/kubectl -o /shared-bin/kubectl
                    chmod +x /shared-bin/kubectl
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                - name: docker-cli-install
                  image: docker:24
                  command:
                  - sh
                  - -c
                  - |
                    cp /usr/local/bin/docker /shared-bin/docker
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                containers:

                - name: docker
                  image: docker:24-dind
                  securityContext:
                    privileged: true
                  env:
                  - name: DOCKER_TLS_CERTDIR
                    value: ""
                  resources:
                    requests:
                      cpu: "500m"
                      memory: "1Gi"
                    limits:
                      cpu: "2"
                      memory: "2Gi"

                - name: jnlp
                  image: jenkins/inbound-agent:latest
                  env:
                  - name: DOCKER_HOST
                    value: "tcp://localhost:2375"
                  - name: PATH
                    value: "/shared-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                volumes:

                - name: shared-bin
                  emptyDir: {}

    persistence:
      enabled: true
      size: 8Gi
      storageClass: gp2

    serviceAccount:
      create: true
      name: jenkins
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::155734788051:role/oneclick-jenkins-irsa