apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-ollama
  namespace: k8sgpt-operator-system
spec:
  interval: 30s
  ai:
    enabled: true
    backend: localai
    model: llama3.2:1b
    baseUrl: http://ollama.jenkins.svc.cluster.local:11434/v1
  noCache: false
  filters:
    - Pod
    - Deployment
    - Service
    - Ingress
    - PersistentVolumeClaim
    - StatefulSet
  repository: ghcr.io/k8sgpt-ai/k8sgpt
  version: v0.4.16