apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 1m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    prometheus:
      prometheusSpec:
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi
    alertmanager:
      enabled: true
      alertmanagerSpec:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      config:
        global:
          resolve_timeout: 5m
          smtp_smarthost: 'smtp.gmail.com:587'
          smtp_from: 'bhatvivek915@gmail.com'
          smtp_auth_username: 'bhatvivek915@gmail.com'
          smtp_auth_password: 'kpuh crrb pnpi pdre'
          smtp_require_tls: true
        inhibit_rules:
        - source_matchers:
          - 'severity = critical'
          target_matchers:
          - 'severity =~ warning|info'
          equal:
          - 'namespace'
          - 'alertname'
        - source_matchers:
          - 'severity = warning'
          target_matchers:
          - 'severity = info'
          equal:
          - 'namespace'
          - 'alertname'
        - source_matchers:
          - 'alertname = InfoInhibitor'
          target_matchers:
          - 'severity = info'
          equal:
          - 'namespace'
        - target_matchers:
          - 'alertname = InfoInhibitor'
        route:
          group_by: ['namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'email-alerts'
          routes:
          - matchers:
            - 'alertname = "Watchdog"'
            receiver: 'null'
          - matchers:
            - 'severity = "critical"'
            receiver: 'email-alerts'
            group_wait: 10s
            group_interval: 1m
            repeat_interval: 5m
        receivers:
        - name: 'null'
        - name: 'email-alerts'
          email_configs:
          - to: 'bhatvivek915@gmail.com'
            send_resolved: true
    grafana:
      adminPassword: "YourGrafanaPass123!"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      grafana.ini:
        server:
          root_url: "%(protocol)s://%(domain)s/grafana/"
          serve_from_sub_path: true
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          nginx.ingress.kubernetes.io/use-regex: "true"
        path: /grafana
        pathType: Prefix
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
