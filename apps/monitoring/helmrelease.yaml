apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 1m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 5m
          smtp_smarthost: 'smtp.gmail.com:587'
          smtp_from: 'vbhat7262@gmail.com'
          smtp_auth_username: 'vbhat7262@gmail.com'
          smtp_auth_password: 'oyox kmyr kwvr ebmd'
          smtp_require_tls: true
        inhibit_rules:
        - source_matchers:
          - 'severity = critical'
          target_matchers:
          - 'severity =~ warning|info'
          equal:
          - 'namespace'
          - 'alertname'
        - source_matchers:
          - 'severity = warning'
          target_matchers:
          - 'severity = info'
          equal:
          - 'namespace'
          - 'alertname'
        - source_matchers:
          - 'alertname = InfoInhibitor'
          target_matchers:
          - 'severity = info'
          equal:
          - 'namespace'
        - target_matchers:
          - 'alertname = InfoInhibitor'
        route:
          group_by: ['namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'email-alerts'
          routes:
          - matchers:
            - 'alertname = "Watchdog"'
            receiver: 'null'
        receivers:
        - name: 'null'
        - name: 'email-alerts'
          email_configs:
          - to: 'vbhat7262@gmail.com'
            send_resolved: true
    grafana:
      adminPassword: "YourGrafanaPass123!"
      grafana.ini:
        server:
          root_url: "%(protocol)s://%(domain)s/grafana/"
          serve_from_sub_path: true
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          nginx.ingress.kubernetes.io/use-regex: "true"
        path: /grafana
        pathType: Prefix
