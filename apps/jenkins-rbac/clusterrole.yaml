apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-helmrelease-viewer
rules:
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-helmrelease-viewer-binding
subjects:
  - kind: User
    name: jenkins-pipeline
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: jenkins-helmrelease-viewer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8sgpt-readonly
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io", "admissionregistration.k8s.io"]
    resources: ["pods", "nodes", "endpoints", "persistentvolumeclaims", "deployments", "replicasets", "statefulsets", "cronjobs", "ingresses", "validatingwebhookconfigurations", "mutatingwebhookconfigurations", "secrets", "events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-k8sgpt-readonly
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
roleRef:
  kind: ClusterRole
  name: k8sgpt-readonly
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-pipeline-exec
subjects:
  - kind: User
    name: jenkins-pipeline
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: k8sgpt-readonly
  apiGroup: rbac.authorization.k8s.io