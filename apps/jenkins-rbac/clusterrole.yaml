apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-helmrelease-viewer
rules:
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-helmrelease-viewer-binding
subjects:
  - kind: User
    name: arn:aws:iam::155734788051:role/oneclick-jenkins-irsa
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: jenkins-helmrelease-viewer
  apiGroup: rbac.authorization.k8s.io