apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: backend-secret
    creationPolicy: Owner
  data:
    - secretKey: PGHOST
      remoteRef:
        key: oneclick/backend-credentials
        property: PGHOST
    - secretKey: PGUSER
      remoteRef:
        key: oneclick/backend-credentials
        property: PGUSER
    - secretKey: PGPASSWORD
      remoteRef:
        key: oneclick/backend-credentials
        property: PGPASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: oneclick/backend-credentials
        property: JWT_SECRET
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: oneclick/backend-credentials
        property: GITHUB_TOKEN
    - secretKey: GITHUB_OWNER
      remoteRef:
        key: oneclick/backend-credentials
        property: GITHUB_OWNER
    - secretKey: GITHUB_REPO
      remoteRef:
        key: oneclick/backend-credentials
        property: GITHUB_REPO
    - secretKey: SMTP_USER
      remoteRef:
        key: oneclick/backend-credentials
        property: SMTP_USER
    - secretKey: SMTP_PASS
      remoteRef:
        key: oneclick/backend-credentials
        property: SMTP_PASS