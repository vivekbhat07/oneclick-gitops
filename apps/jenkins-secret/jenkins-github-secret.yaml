apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-github-token
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager        # matches your existing ClusterSecretStore exactly
    kind: ClusterSecretStore
  target:
    name: jenkins-github-token      # the k8s secret Jenkins HelmRelease expects
    creationPolicy: Owner
  data:
    - secretKey: token              # key name the helmrelease.yaml references
      remoteRef:
        key: oneclick/github-pat    # matches the Secrets Manager secret above
        property: token